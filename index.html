        <div class="home-container4">
          <div class="home-container5">
            <style>
                      @keyframes pulse {0% {transform: scale(1);
              opacity: 1;}
              50% {transform: scale(1.5);
              opacity: 0.5;}
              100% {transform: scale(1);
              opacity: 1;}}@keyframes fadeInUp {from {opacity: 0;
              transform: translateY(30px);}
              to {opacity: 1;
              transform: translateY(0);}}@keyframes fadeInDown {from {opacity: 0;
              transform: translateY(-30px);}
              to {opacity: 1;
              transform: translateY(0);}}@keyframes scrollAnim {0% {transform: translate(-50%, 0);
              opacity: 1;}

        <div class="home-container6">
          <div class="home-container7">
            <script>
              document.addEventListener('DOMContentLoaded', function() {
                (function(){
                  document.addEventListener("mousemove", (e) => {
                    const container = document.getElementById("minimal-hero-section")
                    const mesh = container.querySelector(".background-mesh")

                    const xAxis = (window.innerWidth / 2 - e.pageX) / 25
                    const yAxis = (window.innerHeight / 2 - e.pageY) / 25

                    mesh.style.transform = `translate(${xAxis}px, ${yAxis}px) scale(1.1)`
                  })

                  // Magnetic Button Effect
                  const buttons = document.querySelectorAll(".nav-btn")

                  buttons.forEach((btn) => {
                    btn.addEventListener("mousemove", (e) => {
                      const rect = btn.getBoundingClientRect()
                      const x = e.clientX - rect.left - rect.width / 2
                      const y = e.clientY - rect.top - rect.height / 2

                      btn.style.transform = `translate(${x * 0.2}px, ${y * 0.3}px) translateY(-5px)`
                    })

                    btn.addEventListener("mouseleave", () => {
                      btn.style.transform = `translate(0, 0)`
                    })
                  })
                })()
              });
            </script>
          </div>
